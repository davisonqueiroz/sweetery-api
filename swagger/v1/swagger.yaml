---
openapi: 3.0.1
info:
  title: API V1
  version: v1
paths:
  "/signup":
    post:
      summary: Creates a user account
      tags:
      - User
      parameters: []
      responses:
        '200':
          description: created user
          content:
            application/json:
              examples:
                created_user:
                  value:
                    status:
                      code: 200
                      message: Signed up sucessfully.
                    data:
                      id: 1
                      email: test@dev.com
                      created_at: '2026-05-22T17:54:05.335Z'
                      created_date: 22 05, 2026
        '422':
          description: email already exists
          content:
            application/json:
              examples:
                invalid_email:
                  value:
                    status:
                      message: User couldn't be created successfully. Email has already
                        been taken
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                user:
                  type: object
                  properties:
                    email:
                      type: string
                    password:
                      type: string
                    password_confirmation:
                      type: string
                  required:
                  - email
                  - password
                  - password_confirmation
              required:
              - user
            examples:
              valid_signup:
                summary: Valid payload from create user login
                value:
                  user:
                    email: test@dev.dev
                    password: password
                    password_confirmation: password
  "/login":
    post:
      summary: Authenticates an existing user account
      tags:
      - User
      parameters: []
      responses:
        '200':
          description: authenticated user
          content:
            application/json:
              examples:
                login_sucess:
                  value:
                    status:
                      code: 200
                      message: Logged in sucessfully.
                    data:
                      id: 1
                      email: test@dev.com
                      created_at: '2026-05-22T17:54:05.335Z'
                      created_date: 22 05, 2026
        '401':
          description: invalid password
          content:
            text/plain:
              examples:
                invalid_password:
                  value: Invalid email or password.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                user:
                  type: object
                  properties:
                    email:
                      type: string
                    password:
                      type: string
                  required:
                  - email
                  - password
              required:
              - user
            examples:
              valid_login:
                summary: Valid payload from login
                value:
                  user:
                    email: teste@dev.dev
                    password: password
  "/logout":
    delete:
      summary: Log out an authenticated user
      tags:
      - User
      parameters:
      - name: Authorization
        in: header
        required: true
        description: Bearer JWT token
        schema:
          type: string
      responses:
        '200':
          description: Logged out sucessfully
          content:
            application/json:
              examples:
                logout_sucess:
                  value:
                    status:
                      code: 200
                      message: logged out successfully
              schema:
                type: object
                properties:
                  status:
                    type: object
                    properties:
                      code:
                        type: integer
                      message:
                        type: string
                    required:
                    - code
                    - message
                required:
                - status
        '401':
          description: missing authorization token in request
          content:
            application/json:
              examples:
                logout_sucess:
                  value:
                    status:
                      code: 401
                      message: Couldn't find an active session.
              schema:
                type: object
                properties:
                  status:
                    type: object
                    properties:
                      code:
                        type: integer
                      message:
                        type: string
                    required:
                    - code
                    - message
                required:
                - status
  "/current_user":
    get:
      summary: Retrives current authenticated user
      tags:
      - User
      parameters:
      - name: Authorization
        in: header
        required: true
        description: Bearer JWT token
        schema:
          type: string
      responses:
        '200':
          description: Logged out sucessfully
          content:
            application/json:
              examples:
                current_user:
                  value:
                    id: 1
                    email: test@dev.com
                    created_at: '2026-05-22T17:54:05.335Z'
                    created_date: 22 05, 2026
              schema:
                type: object
                properties:
                  id:
                    type: integer
                  email:
                    type: string
                  created_at:
                    type: string
                    format: date-time
                  created_date:
                    type: string
                required:
                - id
                - email
                - created_at
                - created_date
        '401':
          description: missing authorization token in request
          content:
            text/plain:
              examples:
                missing_token:
                  value: You need to sign in or sign up before continuing.
            application/json:
              schema:
                type: string
servers:
- url: https://{defaultHost}
  variables:
    defaultHost:
      default: www.example.com
